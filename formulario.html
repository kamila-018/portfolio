<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="http://localhost/portfolio/assets/css/style.css" rel="stylesheet">
</head>
<body>
    <form class="form-contato " action="/contato" method="post">
        <label for="nome">Nome</label>
        <input type="text" id="nome" placeholder="Digite seu nome" required>
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Digite seu email" required>
        <label for="data">Data</label>
        <input type="date" id="data">
        <label for="assunto">Assunto</label>

        <select name="assunto" id="assunto">
            <option>[SELECIONE]</option>
            <option>Dúvida</option>
            <option>Orçamento</option>
            <option>Contato</option>
        </select>

        <label for="mensagem">Mensagem</label>
        <textarea name="mensagem" id="mensagem" rows="5" placeholder="Digite sua mensagem"></textarea>

        <button class="btn btn-green btn-small" type="submit">Small</button>
        <button class="btn btn-green" type="submit">Default</button>
        <button class="btn btn-red btn-large senac-card-panel" type="submit">Large</button>
    </body>
    </form>
</html>
